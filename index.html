<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Monitoring — Program Mikro Produktif · Bank Mandiri</title>
<style>
:root{
  --f:"Myriad Pro","Myriad","Gill Sans MT","Calibri","Trebuchet MS",sans-serif;
  --navy:#0B1F3A;
  --navy2:#112847;
  --gold:#C8A96E;
  --gold2:#9E7E4A;
  --gold-tint:rgba(200,169,110,.08);
  --gold-border:rgba(200,169,110,.25);
  --green:#2E7D32;
  --green-bg:#E8F5E9;
  --yellow:#F57F17;
  --yellow-bg:#FFF8E1;
  --gray:#6B7280;
  --gray2:#9CA3AF;
  --border:#E5E7EB;
  --border2:#D1D5DB;
  --bg:#F9FAFB;
  --white:#FFFFFF;
  --text:#111827;
  --text2:#374151;
  --text3:#6B7280;
  --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--f);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  font-size:16px;
}

@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(76,175,80,.35)}50%{box-shadow:0 0 0 6px rgba(76,175,80,.1)}}

/* HERO */
.hero{
  background:var(--navy);
  padding:56px 48px 48px;
  border-bottom:1px solid #1e3a5f;
}
.hero-title{
  font-size:clamp(24px,3.2vw,38px);
  font-weight:700;color:#fff;
  line-height:1.2;max-width:800px;margin-bottom:14px;
}
.hero-tagline{font-size:20px;font-weight:300;color:rgba(255,255,255,.75);margin-bottom:10px}
.hero-info{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:40px}
.hero-info a{color:var(--gold);text-decoration:none;font-weight:600}
.hero-info a:hover{text-decoration:underline}



/* TOOLBAR */
.toolbar{
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:16px 48px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.t-label{font-size:13px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.search-wrap{margin-left:auto;position:relative}
.search-inp{
  background:var(--bg);
  border:1.5px solid var(--border2);
  color:var(--text);
  padding:9px 16px 9px 40px;
  border-radius:24px;width:260px;
  font-size:14px;font-family:var(--f);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-inp::placeholder{color:var(--gray2)}
.search-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,110,.15)}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray2);font-size:15px;pointer-events:none}

/* CONTENT */
.content{max-width:1080px;padding:40px 48px 80px}

/* PRODUCT CARD */
.prod-list{display:flex;flex-direction:column;gap:14px}

.prod-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
  transition:border-color .2s,box-shadow .2s;
  animation:fadeUp .35s ease both;
}
.prod-card:hover{border-color:var(--border2)}
.prod-card.open{
  border-color:var(--gold);
  box-shadow:0 4px 16px rgba(200,169,110,.12);
}

.prod-header{
  display:flex;align-items:center;gap:18px;
  padding:22px 28px;
  cursor:pointer;
  user-select:none;
  transition:background .15s;
}
.prod-header:hover{background:#FAFAFA}
.prod-card.open .prod-header{background:var(--gold-tint)}

.prod-tag{
  background:var(--navy);
  color:#fff;
  font-size:10px;font-weight:700;
  padding:4px 11px;border-radius:4px;
  letter-spacing:.1em;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;
}
.prod-name{
  font-size:18px;font-weight:600;color:var(--text);flex:1;
}
.prod-count{
  font-size:13px;color:var(--text3);margin-right:6px;white-space:nowrap;
  background:var(--bg);border:1px solid var(--border);
  padding:3px 12px;border-radius:20px;
}
.prod-chevron{
  width:28px;height:28px;flex-shrink:0;
  background:var(--bg);
  border:1.5px solid var(--border2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .25s,border-color .2s,background .2s;
  color:var(--gray);font-size:11px;
}
.prod-card.open .prod-chevron{
  transform:rotate(180deg);
  border-color:var(--gold);
  background:var(--gold-tint);
  color:var(--gold2);
}

/* PROGRAM PANEL */
.prog-panel{
  max-height:0;overflow:hidden;
  transition:max-height .32s cubic-bezier(.4,0,.2,1);
}
.prog-panel-inner{border-top:1.5px solid var(--border)}

.prog-row{
  display:flex;align-items:center;gap:0;
  padding:15px 28px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  text-decoration:none;
  transition:background .13s;
  position:relative;
}
.prog-row:last-child{border-bottom:none}
.prog-row:hover{background:#FAFBFF}
.prog-row:hover .prog-arrow{opacity:1;transform:translateX(4px)}
.prog-row:hover .prog-name-txt{color:var(--navy)}

.prog-num{
  font-size:13px;color:var(--gray2);
  width:34px;flex-shrink:0;font-weight:600;
}
.prog-name-txt{
  flex:1;font-size:15px;color:var(--text2);font-weight:500;
  transition:color .13s;
}
.prog-url-txt{
  font-size:12px;color:var(--gray);
  font-family:"SF Mono","Consolas","Courier New",monospace;
  margin-right:16px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:300px;
}
.prog-status{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;margin-right:12px;
  letter-spacing:.04em;
}
.s-active{background:var(--green-bg);color:var(--green)}
.s-active::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.s-check{background:var(--yellow-bg);color:var(--yellow)}
.s-check::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0}

.prog-arrow{
  font-size:16px;color:var(--gold2);
  opacity:0;
  transition:opacity .15s,transform .15s;
  flex-shrink:0;
}

/* FOOTER */
footer{
  background:var(--navy);
  padding:24px 48px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.ft-l{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.03em}
.ft-r{font-size:12px;color:var(--gold);font-weight:600;letter-spacing:.08em}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* EMPTY STATE */
.empty{
  text-align:center;padding:64px 20px;
  color:var(--text3);font-size:15px;
}
.empty strong{display:block;font-size:18px;color:var(--text2);margin-bottom:8px}

/* MOBILE */
@media(max-width:720px){
  .hero,.toolbar,.content,footer{padding-left:20px;padding-right:20px}
  .hero{padding-top:40px}
  .prog-url-txt{display:none}
  .prod-name{font-size:16px}
}
</style>
</head>
<body>

<section class="hero">
  <h1 class="hero-title">Produk &amp; Program Mikro Produktif Bank Mandiri</h1>
  <p class="hero-tagline">Solusi untuk Usaha Anda</p>
  <p class="hero-info">Info lengkap: <a href="https://www.bankmandiri.co.id" target="_blank" rel="noopener">www.bankmandiri.co.id</a></p>

</section>

<div class="toolbar">
  <span class="t-label">Cari Program</span>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-inp" id="srch" type="text" placeholder="Ketik nama program atau URL..."/>
  </div>
</div>

<main class="content">
  <div class="prod-list" id="prodList"></div>
</main>

<footer>
  <div class="ft-l">@2026 PT Bank Mandiri (Persero) Tbk - MDAB Group</div>
</footer>

<script>
const DATA=[
  {tag:"Kredit",name:"Kredit Usaha Mikro (KUM)",items:[
    {name:"Kredit Usaha Mikro (KUM)",url:"https://www.bankmandiri.co.id/kredit-usaha-mikro",status:"active"},
    {name:"Helpdesk Sahabat KUM",url:"https://bmri.id/ChatAgentKUM",status:"active"},
    {name:"Penyesuaian Suku Bunga KUM",url:"https://bmri.id/SukuBungaKUM",status:"active"},
    {name:"Top-up / Refill KUM",url:"https://bmri.id/topupkummandiri",status:"active"},
    {name:"Naik Kelas KUM",url:"https://bmri.id/naikkelaskummandiri",status:"active"},
  ]},
  {tag:"Kredit",name:"KUM Talangan Pembelian (KUMTP)",items:[
    {name:"KUM Talangan Pembelian",url:"https://www.bankmandiri.co.id/en/informasi-kum-talangan-pembelian-bank-mandiri",status:"active"},
    {name:"KUM Talangan LPG 3kg Pangkalan",url:"https://www.bankmandiri.co.id/en/kum-mvc-talangan-pertamina",status:"active"},
    {name:"KUM Talangan SAKTI",url:"https://bmri.id/kumtpsakti",status:"active"},
    {name:"KUMTP Member Merah Indogrosir",url:"https://bmri.id/indgroskum",status:"active"},
  ]},
  {tag:"Kredit",name:"Kredit Usaha Rakyat (KUR)",items:[
    {name:"Kredit Program Perumahan",url:"https://bankmandiri.co.id/kredit-program-perumahan",status:"active"},
    {name:"Kredit Usaha Rakyat (KUR)",url:"https://bmri.id/kur",status:"active"},
  ]},
  {tag:"Digital",name:"Livin' Merchant",items:[
    {name:"MELAJU Livin' Merchant",url:"https://bmri.id/LVMMelaju",status:"active"},
    {name:"MELESAT Member Merah Indogrosir",url:"https://bmri.id/melesatbersamaLVM",status:"active"},
    {name:"(MGM) Member Merah di Indogrosir",url:"https://bmri.id/MGM2026",status:"active"},
  ]},
  {tag:"Agen",name:"Mandiri Agen",items:[
    {name:"Agen Jempolan 2026",url:"https://www.bankmandiri.co.id/en/agen-jempolan-2026",status:"active"},
    {name:"Agen Naik Kelas",url:"https://www.bankmandiri.co.id/en/agen-naik-kelas1",status:"active"},
    {name:"Biller Festival",url:"https://bmri.id/BillerFestivalABS",status:"active"},
    {name:"E+ Cuan Telkomsel",url:"https://www.bankmandiri.co.id/en/paket-mandiri-agen-telkomsel",status:"active"},

    {name:"Mandiri Agen — Halaman Utama",url:"https://www.bankmandiri.co.id/agen-bank-mandiri",status:"active"},
    {name:"Pembaruan PKS Mandiri Agen",url:"https://www.bankmandiri.co.id/en/pembaruan-pks-mandiri-agen",status:"active"},
    {name:"Bebas Biaya Setor Tunai di Mandiri Agen",url:"https://www.bankmandiri.co.id/en/bebas-biaya-setor",status:"active"},

    {name:"Referral Buka Rekening di Mandiri Agen",url:"https://bankmandiri.co.id/refferal-pembukaan-rekening-mandiri-agen",status:"active"},
  ]},
  {tag:"Ekosistem",name:"Ekosistem & Kemitraan",items:[
    {name:"Pasar Gembira 2026",url:"https://bmri.id/pasargembira26",status:"active"},
    {name:"KUR & KUM Khusus Member Indogrosir",url:"https://bmri.id/kurkumindogrosir",status:"active"},
  ]},
  {tag:"Tabungan",name:"Tabungan",items:[
    {name:"Tabungan (AGF Reborn)",url:"https://bmri.id/AGFReborn",status:"active"},
  ]},
  {tag:"UMKM",name:"UMKM & Edukasi",items:[
    {name:"Pendaftaran Hyperlocal Hari UMKM 2026",url:"https://bmri.id/DaftarHyperlocalUMKM",status:"active"},
    {name:"Mikro Bercerita (Podcast)",url:"https://bmri.id/PodcastMikroBercerita2026",status:"active"},
  ]},
];

function shortUrl(u){return u.replace(/^https?:\/\/(www\.)?/,'')}

function buildCards(data){
  const list=document.getElementById('prodList');
  list.innerHTML='';
  if(!data.length){
    list.innerHTML='<div class="empty"><strong>Tidak ada hasil</strong>Coba kata kunci yang berbeda.</div>';
    return;
  }
  data.forEach((cat,ci)=>{
    const card=document.createElement('div');
    card.className='prod-card';
    card.style.animationDelay=`${ci*0.04}s`;
    card.innerHTML=`
      <div class="prod-header" onclick="toggle(this.parentElement)">
        <span class="prod-tag">${cat.tag}</span>
        <span class="prod-name">${cat.name}</span>
        <span class="prod-count">${cat.items.length} program</span>
        <span class="prod-chevron">▼</span>
      </div>
      <div class="prog-panel">
        <div class="prog-panel-inner">
          ${cat.items.map((it,i)=>`
            <a class="prog-row" href="${it.url}" target="_blank" rel="noopener">
              <span class="prog-num">${String(i+1).padStart(2,'0')}</span>
              <span class="prog-name-txt">${it.name}</span>
              <span class="prog-url-txt">${shortUrl(it.url)}</span>
              <span class="prog-status ${it.status==='active'?'s-active':'s-check'}">${it.status==='active'?'Aktif':'Perlu Dicek'}</span>
              <span class="prog-arrow">↗</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function toggle(card){
  const panel=card.querySelector('.prog-panel');
  const inner=card.querySelector('.prog-panel-inner');
  const isOpen=card.classList.contains('open');
  document.querySelectorAll('.prod-card.open').forEach(c=>{
    c.classList.remove('open');
    c.querySelector('.prog-panel').style.maxHeight='0';
  });
  if(!isOpen){
    card.classList.add('open');
    panel.style.maxHeight=inner.scrollHeight+'px';
  }
}

buildCards(DATA);

document.getElementById('srch').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  if(!q){buildCards(DATA);return}
  const filtered=DATA.map(cat=>({
    ...cat,
    items:cat.items.filter(it=>it.name.toLowerCase().includes(q)||it.url.toLowerCase().includes(q))
  })).filter(c=>c.name.toLowerCase().includes(q)||c.items.length>0);
  buildCards(filtered);
  document.querySelectorAll('.prod-card').forEach(card=>{
    const panel=card.querySelector('.prog-panel');
    const inner=card.querySelector('.prog-panel-inner');
    card.classList.add('open');
    panel.style.maxHeight=inner.scrollHeight+'px';
  });
});
</script>
</body>
</html>
